name: Deploy Flutter demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.2
          cache: true

      - name: Install dependencies
        working-directory: mobile_web
        run: flutter pub get

      - name: Build interactive demo
        working-directory: mobile_web
        run: >-
          flutter build web --release
          --base-href "/NuroMood---AI-based-Mental-Health-Monitoring-App/"
          --dart-define=NUROMOOD_DEMO=true

      - name: Disable Jekyll processing
        run: touch mobile_web/build/web/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: mobile_web/build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
